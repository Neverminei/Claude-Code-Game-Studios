name: feishu-bot (已停用 — 机器人改为本地持久进程)

on:
  # schedule 已停用 — 机器人改为本地事件驱动模式
  # 如需恢复定时触发，取消下面注释
  # schedule:
  #   - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run bot
        working-directory: scripts
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node feishu-bot.js

      # 提交更新的 lastProcessedTime
      - name: Commit state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/.feishu-bot-state.json scripts/.feishu-bot-pending.json
          git diff --staged --quiet || git commit -m "chore: update feishu bot state"
          git push
